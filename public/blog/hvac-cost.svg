<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="900" cy="240" r="280" fill="url(#glow)"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Dollar coin -->
  <circle cx="915" cy="248" r="98" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="915" cy="248" r="80" fill="none" stroke="#f97316" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="3 9"/>
  <text x="915" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="#f97316" fill-opacity="0.7" text-anchor="middle">$</text>
  <!-- small wrench -->
  <g transform="translate(1015,150) rotate(45)">
    <rect x="-10" y="-4" width="20" height="90" rx="9" fill="#38bdf8" fill-opacity="0.5"/>
    <path d="M-24 -54 a26 26 0 1 0 46 0 l-12 6 a14 14 0 1 1 -22 0 z" fill="#38bdf8" fill-opacity="0.55"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" fill-opacity="0.95">HVAC Repair</text>
  <text x="100" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f97316">Costs in Niagara</text>
  <text x="100" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">What You're Actually Paying For</text>
  <rect x="100" y="332" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>

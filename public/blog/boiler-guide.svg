<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="280" fill="url(#glow)"/>
  <!-- Boiler body -->
  <rect x="800" y="120" width="200" height="260" rx="16" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.14" stroke-width="2"/>
  <!-- Top dome cap -->
  <ellipse cx="900" cy="120" rx="100" ry="22" fill="white" fill-opacity="0.08"/>
  <!-- Control panel -->
  <rect x="820" y="140" width="160" height="70" rx="8" fill="white" fill-opacity="0.07"/>
  <!-- Gauge circle -->
  <circle cx="870" cy="175" r="22" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="870" cy="175" r="15" fill="white" fill-opacity="0.04"/>
  <path d="M870 162 L870 175" stroke="#f97316" stroke-width="2" stroke-linecap="round" transform="rotate(-30 870 175)"/>
  <!-- Digital display -->
  <rect x="910" y="155" width="60" height="40" rx="4" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="940" y="180" font-family="monospace" font-size="14" font-weight="700" fill="#f97316" fill-opacity="0.8" text-anchor="middle">70°</text>
  <!-- Pipe connections -->
  <rect x="855" y="380" width="20" height="50" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="925" y="380" width="20" height="50" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Radiator fins -->
  <rect x="800" y="240" width="200" height="100" rx="0" fill="white" fill-opacity="0.04"/>
  <line x1="820" y1="240" x2="820" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="850" y1="240" x2="850" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="880" y1="240" x2="880" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="910" y1="240" x2="910" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="940" y1="240" x2="940" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="970" y1="240" x2="970" y2="340" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Flue pipe -->
  <rect x="870" y="55" width="30" height="68" rx="8" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" fill-opacity="0.95">Boiler &amp;</text>
  <text x="100" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f97316">Hydronic Heat</text>
  <text x="100" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Niagara Residential HVAC</text>
  <rect x="100" y="335" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="900" cy="240" r="280" fill="url(#glow)"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Sun (heat) -->
  <g transform="translate(895,195)">
    <circle r="44" fill="#f97316" fill-opacity="0.6"/>
    <g stroke="#f97316" stroke-opacity="0.55" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="-62" x2="0" y2="-80"/>
      <line x1="44" y1="-44" x2="57" y2="-57"/>
      <line x1="62" y1="0" x2="80" y2="0"/>
      <line x1="44" y1="44" x2="57" y2="57"/>
      <line x1="-44" y1="-44" x2="-57" y2="-57"/>
      <line x1="-62" y1="0" x2="-80" y2="0"/>
    </g>
  </g>
  <!-- Snowflake (cool) -->
  <text x="985" y="380" font-family="system-ui" font-size="120" fill="#38bdf8" fill-opacity="0.7" text-anchor="middle">❄</text>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="800" fill="white" fill-opacity="0.95">Heating &amp; Cooling</text>
  <text x="100" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="#f97316">Haldimand County</text>
  <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Dunnville · Caledonia · Cayuga</text>
  <rect x="100" y="330" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>

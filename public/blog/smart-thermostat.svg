<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="905" cy="245" r="220" fill="url(#glow)"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Thermostat dial -->
  <circle cx="905" cy="245" r="118" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="905" cy="245" r="96" fill="#0b2d52"/>
  <circle cx="905" cy="245" r="96" fill="none" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="6" stroke-dasharray="150 200" transform="rotate(120 905 245)"/>
  <circle cx="905" cy="245" r="96" fill="none" stroke="#f97316" stroke-opacity="0.55" stroke-width="6" stroke-dasharray="90 260" transform="rotate(270 905 245)"/>
  <text x="905" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="white" text-anchor="middle">21°</text>
  <text x="905" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="3">HEAT</text>

  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" fill-opacity="0.95">Smart</text>
  <text x="100" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f97316">Thermostats</text>
  <text x="100" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Are They Worth It for Niagara Homes?</text>
  <rect x="100" y="332" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>

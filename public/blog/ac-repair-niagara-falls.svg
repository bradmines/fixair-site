  <circle cx="905" cy="250" r="74" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <ellipse cx="905" cy="204" rx="12" ry="36" fill="white" fill-opacity="0.16" transform="rotate(0 905 250)"/>
  <ellipse cx="905" cy="204" rx="12" ry="36" fill="white" fill-opacity="0.16" transform="rotate(72 905 250)"/>
  <ellipse cx="905" cy="204" rx="12" ry="36" fill="white" fill-opacity="0.16" transform="rotate(144 905 250)"/>
  <ellipse cx="905" cy="204" rx="12" ry="36" fill="white" fill-opacity="0.16" transform="rotate(216 905 250)"/>

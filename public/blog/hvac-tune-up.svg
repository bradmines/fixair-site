<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="900" cy="240" r="280" fill="url(#glow)"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Large gear -->
  <g transform="translate(900,236)">
    <g fill="white" fill-opacity="0.14">
      <rect x="-12" y="-96" width="24" height="30" rx="4"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(45)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(90)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(135)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(180)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(225)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(270)"/>
      <rect x="-12" y="-96" width="24" height="30" rx="4" transform="rotate(315)"/>
    </g>
    <circle r="72" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.18" stroke-width="3"/>
    <circle r="30" fill="#0b2d52" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="4"/>
  </g>
  <!-- Small gear -->
  <g transform="translate(1030,330)">
    <g fill="#f97316" fill-opacity="0.4">
      <rect x="-8" y="-56" width="16" height="20" rx="3"/>
      <rect x="-8" y="-56" width="16" height="20" rx="3" transform="rotate(60)"/>
      <rect x="-8" y="-56" width="16" height="20" rx="3" transform="rotate(120)"/>
      <rect x="-8" y="-56" width="16" height="20" rx="3" transform="rotate(180)"/>
      <rect x="-8" y="-56" width="16" height="20" rx="3" transform="rotate(240)"/>
      <rect x="-8" y="-56" width="16" height="20" rx="3" transform="rotate(300)"/>
    </g>
    <circle r="42" fill="#0b2d52" stroke="#f97316" stroke-opacity="0.45" stroke-width="3"/>
    <circle r="16" fill="none" stroke="#f97316" stroke-opacity="0.45" stroke-width="4"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" fill-opacity="0.95">Annual HVAC</text>
  <text x="100" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f97316">Tune-Up</text>
  <text x="100" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Why Maintenance Saves You Money</text>
  <rect x="100" y="332" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>

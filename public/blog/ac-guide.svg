<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="900" cy="240" r="280" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- AC Condenser unit -->
  <rect x="800" y="130" width="240" height="240" rx="16" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Fan circle -->
  <circle cx="920" cy="250" r="80" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="920" cy="250" r="60" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Fan blades -->
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(0 920 250)"/>
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(60 920 250)"/>
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(120 920 250)"/>
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(180 920 250)"/>
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(240 920 250)"/>
  <ellipse cx="920" cy="200" rx="14" ry="40" fill="white" fill-opacity="0.18" transform="rotate(300 920 250)"/>
  <circle cx="920" cy="250" r="16" fill="#0b2d52"/>
  <circle cx="920" cy="250" r="12" fill="white" fill-opacity="0.15"/>
  <!-- Top panel -->
  <rect x="815" y="145" width="210" height="30" rx="4" fill="white" fill-opacity="0.08"/>
  <!-- Snowflake icon -->
  <text x="840" y="167" font-family="system-ui" font-size="18" fill="#38bdf8" fill-opacity="0.8">❄</text>
  <!-- Bottom vents -->
  <rect x="815" y="350" width="210" height="8" rx="4" fill="white" fill-opacity="0.12"/>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" fill-opacity="0.95">Air Conditioner</text>
  <text x="100" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f97316">Guide</text>
  <text x="100" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Niagara Residential HVAC</text>
  <rect x="100" y="335" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>

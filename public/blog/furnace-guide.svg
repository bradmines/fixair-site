  <circle cx="900" cy="200" r="300" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="480" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="480" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="480" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Furnace illustration -->
  <!-- Main body -->
  <rect x="820" y="100" width="200" height="280" rx="12" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Panel lines -->
  <rect x="840" y="130" width="160" height="80" rx="6" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Flame icon -->
  <path d="M920 155 C920 155 908 165 906 178 C904 191 912 200 920 200 C928 200 936 191 934 178 C932 165 920 155 920 155 Z" fill="#f97316" fill-opacity="0.9"/>
  <path d="M920 170 C920 170 913 177 912 184 C911 191 915 196 920 196 C925 196 929 191 928 184 C927 177 920 170 920 170 Z" fill="#fbbf24" fill-opacity="0.9"/>
  <!-- Vents -->
  <rect x="845" y="230" width="150" height="8" rx="4" fill="white" fill-opacity="0.15"/>
  <rect x="845" y="248" width="150" height="8" rx="4" fill="white" fill-opacity="0.12"/>
  <rect x="845" y="266" width="150" height="8" rx="4" fill="white" fill-opacity="0.09"/>
  <rect x="845" y="284" width="150" height="8" rx="4" fill="white" fill-opacity="0.06"/>
  <!-- Pipes -->
  <rect x="880" y="50" width="20" height="55" rx="4" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="940" y="50" width="20" height="55" rx="4" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" fill-opacity="0.95">Furnace</text>
  <text x="100" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f97316">Guide</text>
  <text x="100" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Niagara Residential HVAC</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2d52"/>
      <stop offset="100%" style="stop-color:#0f3d6e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="950" cy="220" r="260" fill="url(#glow)"/>
  <!-- Wall unit (indoor head) -->
  <rect x="780" y="100" width="280" height="90" rx="12" fill="white" fill-opacity="0.07" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Front panel detail -->
  <rect x="795" y="112" width="250" height="45" rx="8" fill="white" fill-opacity="0.06"/>
  <!-- Louver slots -->
  <rect x="800" y="165" width="250" height="8" rx="4" fill="white" fill-opacity="0.15"/>
  <rect x="800" y="177" width="250" height="5" rx="2.5" fill="white" fill-opacity="0.08"/>
  <!-- Air flow lines -->
  <path d="M830 200 C850 220 870 240 880 270" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="4,4"/>
  <path d="M900 200 C900 225 900 250 900 280" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="4,4"/>
  <path d="M970 200 C950 220 930 240 920 270" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="4,4"/>
  <!-- Outdoor unit -->
  <rect x="800" y="310" width="140" height="120" rx="10" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
  <!-- Conduit line -->
  <path d="M870 310 L870 260" stroke="white" stroke-width="6" stroke-opacity="0.12" stroke-linecap="round"/>
  <!-- Fan on outdoor -->
  <circle cx="870" cy="370" r="42" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <ellipse cx="870" cy="335" rx="10" ry="32" fill="white" fill-opacity="0.12" transform="rotate(0 870 370)"/>
  <ellipse cx="870" cy="335" rx="10" ry="32" fill="white" fill-opacity="0.12" transform="rotate(90 870 370)"/>
  <ellipse cx="870" cy="335" rx="10" ry="32" fill="white" fill-opacity="0.12" transform="rotate(45 870 370)"/>
  <ellipse cx="870" cy="335" rx="10" ry="32" fill="white" fill-opacity="0.12" transform="rotate(135 870 370)"/>
  <circle cx="870" cy="370" r="10" fill="#0b2d52"/>
  <!-- Text -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" fill-opacity="0.95">Ductless System</text>
  <text x="100" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f97316">Guide</text>
  <text x="100" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" fill-opacity="0.55">Niagara Residential HVAC</text>
  <rect x="100" y="335" width="140" height="36" rx="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="1">FIXAIR BLOG</text>
</svg>
